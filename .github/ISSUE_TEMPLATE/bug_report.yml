name: Bug report
description: Report a problem with chaotic
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the adapter (http/httpsrv/sql/grpc) if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps that reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: chaotic version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.26.2
    validations:
      required: true