name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build, vet, test every module (race)
        run: |
          set -e
          for dir in $(find . -name go.mod -not -path '*/testdata/*' -execdir pwd \;); do
            echo "== module: $dir =="
            (cd "$dir" && go build ./... && go vet ./... && go test -race ./...)
          done
      - name: chaos_off build + zero-alloc gate (every module)
        run: |
          set -e
          for dir in $(find . -name go.mod -not -path '*/testdata/*' -execdir pwd \;); do
            echo "== chaos_off module: $dir =="
            (cd "$dir" && go build -tags chaos_off ./... && go test -tags chaos_off -run ZeroAllocUnderChaosOff ./...)
          done
      - name: gofmt
        run: |
          dirty=$(gofmt -l .)
          if [ -n "$dirty" ]; then
            echo "gofmt needs to run on:"; echo "$dirty"; exit 1
          fi
