name: bigo
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bigo:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true
      - name: bigo complexity budgets
        run: |
          golangci-lint custom
          ./bin/custom-gcl run --config .golangci-bigo.yml ./...
