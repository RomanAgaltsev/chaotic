version: "2"

run:
  timeout: 5m

linters:
  default: standard   # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - revive
    - gosec
    - bodyclose
    - misspell
    - unconvert
    - usestdlibvars
    - copyloopvar
    - nilerr
    - nolintlint
  settings:
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    rules:
      # Test files may take shortcuts that are unsafe in production code.
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports